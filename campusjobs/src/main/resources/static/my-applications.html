<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Мои заявки - Campus Jobs</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        .status-pending { background-color: #ffc107; color: black; }
        .status-approved { background-color: #198754; }
        .status-rejected { background-color: #dc3545; }
    </style>
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container">
        <a class="navbar-brand" href="/index.html">Campus Jobs</a>
        <div class="navbar-nav ms-auto">
            <a class="nav-link" href="/index.html">Главная</a>
            <a class="nav-link" href="/vacancies.html">Вакансии</a>
            <a class="nav-link" href="/my-applications.html">Мои заявки</a>
            <a class="nav-link" href="/profile.html">Личный кабинет</a>
            <a class="nav-link" href="/create-vacancy.html">Разместить вакансию</a>
        </div>
    </div>
</nav>

<div class="container mt-5">
    <h2 class="mb-4">Мои заявки</h2>
    <div id="applicationsList" class="row"></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script>
    async function loadApplications() {
        try {
            const response = await fetch('/api/applications/student/1');
            const applications = await response.json();
            const container = document.getElementById('applicationsList');
            container.innerHTML = '';

            if (applications.length === 0) {
                container.innerHTML = `<div class="col-12 text-center py-5"><p class="text-muted fs-5">У вас пока нет поданных заявок</p></div>`;
                return;
            }

            applications.forEach(app => {
                const statusClass = app.status === 'PENDING' ? 'status-pending' :
                                  app.status === 'APPROVED' ? 'status-approved' : 'status-rejected';

                const cardHTML = `
                    <div class="col-12 mb-4">
                        <div class="card">
                            <div class="card-body">
                                <div class="d-flex justify-content-between align-items-start">
                                    <div>
                                        <h5 class="card-title">${app.vacancy.title}</h5>
                                        <p class="text-muted mb-1">${app.vacancy.employer?.companyName || 'Работодатель'}</p>
                                    </div>
                                    <span class="badge ${statusClass} text-white px-3 py-2 fs-6">${app.status}</span>
                                </div>
                                <small class="text-muted">Подана: ${new Date(app.appliedAt).toLocaleDateString('ru-RU')}</small>

                                <div class="mt-3">
                                    <a href="/leave-review.html?applicationId=${app.id}"
                                       class="btn btn-outline-primary btn-sm me-2">
                                        Оставить отзыв
                                    </a>
                                </div>
                            </div>
                        </div>
                    </div>`;
                container.innerHTML += cardHTML;
            });
        } catch (error) {
            console.error(error);
            document.getElementById('applicationsList').innerHTML = `<div class="col-12"><p class="text-danger">Не удалось загрузить заявки</p></div>`;
        }
    }

    window.onload = loadApplications;
</script>
</body>
</html>
