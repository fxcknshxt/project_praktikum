<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Вакансии - Campus Jobs</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        .card { transition: all 0.3s; }
        .card:hover { transform: translateY(-5px); box-shadow: 0 10px 20px rgba(0,0,0,0.1); }
    </style>
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container">
        <a class="navbar-brand" href="/index.html">Campus Jobs</a>
        <div class="navbar-nav ms-auto">
            <a class="nav-link" href="/index.html">Главная</a>
            <a class="nav-link" href="/vacancies.html">Вакансии</a>
            <a class="nav-link" href="/my-applications.html">Мои заявки</a>
            <a class="nav-link" href="/profile.html">Личный кабинет</a>
            <a class="nav-link" href="/create-vacancy.html">Разместить вакансию</a>
        </div>
    </div>
</nav>

<div class="container mt-4">
    <h2>Вакансии и стажировки</h2>

    <div class="row mb-4">
        <div class="col-md-3">
            <input type="text" id="keyword" class="form-control" placeholder="Поиск по названию...">
        </div>
        <div class="col-md-3">
            <select id="typeFilter" class="form-select">
                <option value="">Все типы</option>
                <option value="INTERNSHIP">Стажировка</option>
                <option value="PART_TIME">Частичная занятость</option>
                <option value="FULL_TIME">Полная занятость</option>
            </select>
        </div>
        <div class="col-md-3">
            <select id="categoryFilter" class="form-select">
                <option value="">Все категории</option>
            </select>
        </div>
        <div class="col-md-3">
            <button class="btn btn-primary w-100" onclick="applyFilters()">Применить фильтры</button>
        </div>
    </div>

    <div class="row" id="vacanciesList"></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script>
    async function loadCategories() {
        try {
            const response = await fetch('/api/vacancies/categories');
            if (!response.ok) throw new Error("Не удалось загрузить категории");

            const categories = await response.json();
            const select = document.getElementById('categoryFilter');

            select.innerHTML = '<option value="">Все категории</option>';

            categories.forEach(cat => {
                const option = document.createElement('option');
                option.value = cat.id;
                option.textContent = cat.name;
                select.appendChild(option);
            });

            console.log("Категории загружены:", categories.length);
        } catch (e) {
            console.error("Ошибка загрузки категорий:", e);
        }
    }

    async function loadVacancies(keyword = '', type = '', categoryId = '') {
        let url = `/api/vacancies/filtered?keyword=${encodeURIComponent(keyword)}&type=${type}&categoryId=${categoryId || ''}`;

        try {
            const response = await fetch(url);
            const vacancies = await response.json();

            const container = document.getElementById('vacanciesList');
            container.innerHTML = '';

            if (vacancies.length === 0) {
                container.innerHTML = '<div class="col-12 text-center"><p class="text-muted">Вакансий не найдено по заданным фильтрам</p></div>';
                return;
            }

            vacancies.forEach(v => {
                const card = `
                    <div class="col-md-6 col-lg-4 mb-4">
                        <div class="card h-100">
                            <div class="card-body">
                                <h5 class="card-title">${v.title}</h5>
                                <p class="text-muted">${v.employer?.companyName || ''}</p>
                                <p class="card-text">${v.description.substring(0, 110)}...</p>
                                <div class="d-flex justify-content-between">
                                    <span class="badge bg-primary">${v.type === 'INTERNSHIP' ? 'Стажировка' : v.type === 'PART_TIME' ? 'Частичная' : 'Полная'}</span>
                                    ${v.salary ? `<span class="fw-bold">${v.salary} ₽</span>` : ''}
                                </div>
                            </div>
                            <div class="card-footer">
                                <a href="/vacancy-detail.html?id=${v.id}" class="btn btn-outline-primary w-100">Подробнее</a>
                            </div>
                        </div>
                    </div>`;
                container.innerHTML += card;
            });
        } catch (error) {
            console.error(error);
            document.getElementById('vacanciesList').innerHTML = '<div class="col-12 text-danger">Ошибка загрузки вакансий</div>';
        }
    }

    function applyFilters() {
        const keyword = document.getElementById('keyword').value.trim();
        const type = document.getElementById('typeFilter').value;
        const categoryId = document.getElementById('categoryFilter').value;
        loadVacancies(keyword, type, categoryId);
    }

    window.onload = () => {
        loadCategories();
        loadVacancies();
    };
</script>
</body>
</html>
