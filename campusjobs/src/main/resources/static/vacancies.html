<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Вакансии - Campus Jobs</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        .card { transition: all 0.3s; }
        .card:hover { transform: translateY(-5px); box-shadow: 0 10px 20px rgba(0,0,0,0.1); }
        .navbar { background-color: #343a40; }
    </style>
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark">
    <div class="container">
        <a class="navbar-brand" href="/index.html">Campus Jobs</a>
        <div class="navbar-nav ms-auto">
            <a class="nav-link" href="/index.html">Главная</a>
            <a class="nav-link active" href="/vacancies.html">Вакансии</a>
            <a class="nav-link" href="/my-applications.html">Мои заявки</a>
        </div>
    </div>
</nav>

<div class="container mt-4">
    <div class="row mb-4">
        <div class="col-md-8">
            <h2>Доступные вакансии и стажировки</h2>
        </div>
        <div class="col-md-4">
            <div class="input-group">
                <input type="text" id="searchInput" class="form-control" placeholder="Поиск по названию или описанию...">
                <button class="btn btn-primary" onclick="searchVacancies()">Найти</button>
            </div>
        </div>
    </div>

    <div class="row" id="vacanciesList">
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script>
    async function loadVacancies(keyword = '') {
        let url = '/api/vacancies';
        if (keyword) {
            url = `/api/vacancies/search?keyword=${encodeURIComponent(keyword)}`;
        }

        try {
            const response = await fetch(url);
            const vacancies = await response.json();

            const container = document.getElementById('vacanciesList');
            container.innerHTML = '';

            if (vacancies.length === 0) {
                container.innerHTML = '<div class="col-12"><p class="text-center">Вакансий не найдено</p></div>';
                return;
            }

            vacancies.forEach(vacancy => {
                const card = `
                    <div class="col-md-6 col-lg-4 mb-4">
                        <div class="card h-100">
                            <div class="card-body">
                                <h5 class="card-title">${vacancy.title}</h5>
                                <p class="text-muted">${vacancy.employer?.companyName || 'Работодатель'}</p>
                                <p class="card-text">${vacancy.description.substring(0, 120)}...</p>
                                <div class="d-flex justify-content-between align-items-center">
                                    <span class="badge bg-primary">${vacancy.type === 'INTERNSHIP' ? 'Стажировка' : vacancy.type === 'PART_TIME' ? 'Частичная занятость' : 'Полная занятость'}</span>
                                    ${vacancy.salary ? `<span class="fw-bold">${vacancy.salary} ₽</span>` : ''}
                                </div>
                            </div>
                            <div class="card-footer">
                                <a href="/vacancy-detail.html?id=${vacancy.id}" class="btn btn-outline-primary w-100">
                                    Подробнее и подать заявку
                                </a>
                            </div>
                        </div>
                    </div>
                `;
                container.innerHTML += card;
            });
        } catch (error) {
            console.error('Ошибка при загрузке вакансий:', error);
            document.getElementById('vacanciesList').innerHTML =
                '<div class="col-12"><p class="text-danger">Ошибка загрузки данных. Проверьте, запущен ли сервер.</p></div>';
        }
    }

    function searchVacancies() {
        const keyword = document.getElementById('searchInput').value.trim();
        loadVacancies(keyword);
    }

    window.onload = () => loadVacancies();
</script>
</body>
</html>
