<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Подать заявку - Campus Jobs</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container">
        <a class="navbar-brand" href="/index.html">Campus Jobs</a>
        <div class="navbar-nav ms-auto">
            <a class="nav-link" href="/index.html">Главная</a>
            <a class="nav-link" href="/vacancies.html">Вакансии</a>
            <a class="nav-link" href="/my-applications.html">Мои заявки</a>
        </div>
    </div>
</nav>

<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-lg-8">
            <div class="card shadow">
                <div class="card-header bg-primary text-white">
                    <h4 class="mb-0">Подать заявку на вакансию</h4>
                </div>
                <div class="card-body">
                    <div class="mb-4">
                        <h5 id="vacancyTitle">Название вакансии</h5>
                        <p class="text-muted" id="companyName"></p>
                    </div>

                    <form id="applicationForm">
                        <div class="mb-3">
                            <label class="form-label">Сопроводительное письмо</label>
                            <textarea id="coverLetter" class="form-control" rows="8"
                                      placeholder="Напишите, почему вы подходите на эту позицию..." required></textarea>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Выберите резюме</label>
                            <select id="resumeId" class="form-select" required>
                                <option value="">Выберите резюме...</option>
                                <!-- Можно будет добавить реальные резюме позже -->
                                <option value="1">Резюме_Java_Developer.pdf</option>
                                <option value="2">Резюме_Общее.pdf</option>
                            </select>
                        </div>

                        <button type="submit" class="btn btn-success btn-lg w-100">
                            Отправить заявку
                        </button>
                    </form>
                </div>
            </div>

            <div class="text-center mt-4">
                <a href="/vacancies.html" class="btn btn-outline-secondary">← Вернуться к вакансиям</a>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script>
    const urlParams = new URLSearchParams(window.location.search);
    const vacancyId = urlParams.get('vacancyId');

    async function loadVacancyInfo() {
        if (!vacancyId) return;

        try {
            const response = await fetch(`/api/vacancies/${vacancyId}`);
            const vacancy = await response.json();

            document.getElementById('vacancyTitle').textContent = vacancy.title;
            document.getElementById('companyName').textContent = vacancy.employer?.companyName || '';
        } catch (e) {
            console.error(e);
        }
    }

    document.getElementById('applicationForm').addEventListener('submit', async function(e) {
    e.preventDefault();

    const coverLetterText = document.getElementById('coverLetter').value.trim();

    if (!coverLetterText) {
        alert("Напишите сопроводительное письмо!");
        return;
    }

    try {
        const response = await fetch(
            `/api/applications?studentId=1&vacancyId=${vacancyId}&coverLetterContent=${encodeURIComponent(coverLetterText)}`,
            {
                method: 'POST'
            }
        );

        if (response.ok) {
            alert("Заявка успешно отправлена!");
            window.location.href = "/my-applications.html";
        } else {
            alert("Ошибка сервера: " + response.status);
        }
    } catch (error) {
        console.error(error);
        alert("Ошибка соединения с сервером");
    }
});

    window.onload = loadVacancyInfo;
</script>
</body>
</html>
