<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Создать новую вакансию - Campus Jobs</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container">
        <a class="navbar-brand" href="/index.html">Campus Jobs</a>
        <div class="navbar-nav ms-auto">
            <a class="nav-link" href="/index.html">Главная</a>
            <a class="nav-link" href="/vacancies.html">Вакансии</a>
            <a class="nav-link" href="/my-applications.html">Мои заявки</a>
            <a class="nav-link" href="/create-vacancy.html">Разместить вакансию</a>
        </div>
    </div>
</nav>

<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-lg-8">
            <div class="card shadow">
                <div class="card-header bg-success text-white">
                    <h4 class="mb-0">Разместить новую вакансию / стажировку</h4>
                </div>
                <div class="card-body">
                    <form id="createVacancyForm">
                        <div class="mb-3">
                            <label class="form-label">Заголовок вакансии *</label>
                            <input type="text" id="title" class="form-control" required>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Описание вакансии *</label>
                            <textarea id="description" class="form-control" rows="5" required></textarea>
                        </div>

                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label class="form-label">Зарплата (в рублях)</label>
                                <input type="number" id="salary" class="form-control" placeholder="45000">
                            </div>
                            <div class="col-md-6 mb-3">
                                <label class="form-label">Тип занятости *</label>
                                <select id="type" class="form-select" required>
                                    <option value="INTERNSHIP">Стажировка</option>
                                    <option value="PART_TIME">Частичная занятость</option>
                                    <option value="FULL_TIME">Полная занятость</option>
                                </select>
                            </div>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Местоположение</label>
                            <input type="text" id="location" class="form-control" placeholder="Москва, офис / удалённо">
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Крайний срок подачи заявок</label>
                            <input type="date" id="deadline" class="form-control">
                        </div>

                        <button type="submit" class="btn btn-success btn-lg w-100 mt-3">
                            Разместить вакансию
                        </button>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script>
    document.getElementById('createVacancyForm').addEventListener('submit', async function(e) {
        e.preventDefault();

        const vacancyData = {
            title: document.getElementById('title').value,
            description: document.getElementById('description').value,
            salary: document.getElementById('salary').value ? parseFloat(document.getElementById('salary').value) : null,
            type: document.getElementById('type').value,
            location: document.getElementById('location').value,
            deadline: document.getElementById('deadline').value || null
        };

        try {
            const response = await fetch('/api/vacancies/create', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(vacancyData)
            });

            if (response.ok) {
                alert("Вакансия успешно размещена!");
                window.location.href = "/vacancies.html";
            } else {
                alert("Ошибка при создании вакансии (код: " + response.status + ")");
            }
        } catch (error) {
            console.error(error);
            alert("Ошибка соединения с сервером");
        }
    });
</script>
</body>
</html>
