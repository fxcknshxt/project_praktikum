<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Подробности вакансии - Campus Jobs</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        .card { box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
    </style>
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container">
        <a class="navbar-brand" href="/index.html">Campus Jobs</a>
        <div class="navbar-nav ms-auto">
            <a class="nav-link" href="/index.html">Главная</a>
            <a class="nav-link" href="/vacancies.html">Вакансии</a>
            <a class="nav-link" href="/my-applications.html">Мои заявки</a>
        </div>
    </div>
</nav>

<div class="container mt-5">
    <div class="row">
        <div class="col-lg-8">
            <div class="card">
                <div class="card-body">
                    <h2 id="vacancyTitle" class="card-title"></h2>
                    <p class="text-muted" id="companyName"></p>

                    <div class="d-flex gap-3 mb-4">
                        <span id="typeBadge" class="badge bg-primary fs-6"></span>
                        <span id="salary" class="fw-bold fs-5"></span>
                        <span id="location" class="text-muted"></span>
                    </div>

                    <h5>Описание вакансии</h5>
                    <p id="description" class="lead"></p>

                    <h5 class="mt-4">Требования и условия</h5>
                    <ul id="requirements" class="list-group list-group-flush">
                        <!-- Заполнится через JS -->
                    </ul>
                </div>
            </div>
        </div>

        <div class="col-lg-4">
            <div class="card sticky-top" style="top: 20px;">
                <div class="card-body">
                    <h5>Хотите откликнуться?</h5>
                    <p class="text-muted small">Подайте заявку прямо сейчас</p>

                    <button onclick="applyForVacancy()" class="btn btn-success btn-lg w-100 mb-3">
                        Подать заявку
                    </button>

                    <a href="/vacancies.html" class="btn btn-outline-secondary w-100">
                        ← Вернуться к списку
                    </a>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script>
    const urlParams = new URLSearchParams(window.location.search);
    const vacancyId = urlParams.get('id');

    async function loadVacancyDetail() {
        if (!vacancyId) {
            document.body.innerHTML = "<h2 class='text-center mt-5'>Вакансия не найдена</h2>";
            return;
        }

        try {
            const response = await fetch(`/api/vacancies/${vacancyId}`);
            if (!response.ok) throw new Error("Вакансия не найдена");

            const vacancy = await response.json();

            document.getElementById('vacancyTitle').textContent = vacancy.title;
            document.getElementById('companyName').textContent = vacancy.employer?.companyName || 'Работодатель';
            document.getElementById('description').textContent = vacancy.description;
            document.getElementById('salary').textContent = vacancy.salary ? vacancy.salary + ' ₽' : 'Зарплата не указана';
            document.getElementById('location').textContent = vacancy.location || 'Место не указано';

            const typeBadge = document.getElementById('typeBadge');
            if (vacancy.type === 'INTERNSHIP') {
                typeBadge.textContent = 'Стажировка';
                typeBadge.className = 'badge bg-success fs-6';
            } else if (vacancy.type === 'PART_TIME') {
                typeBadge.textContent = 'Частичная занятость';
                typeBadge.className = 'badge bg-warning fs-6';
            } else {
                typeBadge.textContent = 'Полная занятость';
                typeBadge.className = 'badge bg-primary fs-6';
            }

        } catch (error) {
            console.error(error);
            alert("Не удалось загрузить данные вакансии");
        }
    }

    function applyForVacancy() {
        if (confirm("Перейти к подаче заявки на эту вакансию?")) {
            window.location.href = `/apply.html?vacancyId=${vacancyId}`;
        }
    }

    window.onload = loadVacancyDetail;
</script>
</body>
</html>
