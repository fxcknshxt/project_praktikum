<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Оставить отзыв - Campus Jobs</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container">
        <a class="navbar-brand" href="/index.html">Campus Jobs</a>
        <div class="navbar-nav ms-auto">
            <a class="nav-link" href="/index.html">Главная</a>
            <a class="nav-link" href="/vacancies.html">Вакансии</a>
            <a class="nav-link" href="/my-applications.html">Мои заявки</a>
        </div>
    </div>
</nav>

<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-lg-6">
            <div class="card">
                <div class="card-header bg-info text-white">
                    <h4 class="mb-0">Оставить отзыв о стажировке</h4>
                </div>
                <div class="card-body">
                    <form id="reviewForm">
                        <div class="mb-3">
                            <label class="form-label">Рейтинг (1-5)</label>
                            <select id="rating" class="form-select" required>
                                <option value="5">5 — Отлично</option>
                                <option value="4">4 — Хорошо</option>
                                <option value="3">3 — Нормально</option>
                                <option value="2">2 — Удовлетворительно</option>
                                <option value="1">1 — Плохо</option>
                            </select>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Комментарий</label>
                            <textarea id="comment" class="form-control" rows="4" placeholder="Ваш отзыв..."></textarea>
                        </div>

                        <button type="submit" class="btn btn-primary btn-lg w-100">
                            Отправить отзыв
                        </button>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script>
    document.getElementById('reviewForm').addEventListener('submit', async function(e) {
        e.preventDefault();

        const rating = document.getElementById('rating').value;
        const comment = document.getElementById('comment').value.trim();

        // Для теста используем applicationId = 1
        try {
            const response = await fetch('/api/reviews?applicationId=1&rating=' + rating + '&comment=' + encodeURIComponent(comment), {
                method: 'POST'
            });

            if (response.ok) {
                alert("Отзыв успешно отправлен!");
                window.location.href = "/my-applications.html";
            } else {
                alert("Ошибка при отправке отзыва");
            }
        } catch (error) {
            alert("Ошибка соединения");
        }
    });
</script>
</body>
</html>
